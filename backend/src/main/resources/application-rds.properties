# RDS profile — overrides for AWS RDS PostgreSQL with SSL
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=verify-full&sslrootcert=${SSL_ROOT_CERT:global-bundle.pem}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}

# Optionally override admin password for RDS
# app.admin.password=${ADMIN_PASSWORD}